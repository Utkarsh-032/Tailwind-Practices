<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-r from-purple-400 to-yellow-400 h-screen flex items-center justify-center"
  >
    <!-- Outer Card -->
    <div
      class="bg-white/20 backdrop-blur-lg p-10 rounded-3xl shadow-2xl relative w-80 text-center"
    >
      <!-- Big Circle -->
      <div
        class="w-64 h-64 bg-white/30 rounded-full mx-auto flex items-center justify-center shadow-inner"
      >
        <!-- Inner Card -->
        <div
          class="bg-white/40 backdrop-blur-md p-6 rounded-2xl shadow-lg w-52"
        >
          <!-- Profile Circle -->
          <div class="w-16 h-16 bg-gray-300 rounded-full mx-auto mb-4"></div>

          <!-- Name -->
          <h2 class="text-sm font-bold text-gray-800">JOHN DOE</h2>

          <!-- Role -->
          <p class="text-xs text-gray-600">Graphics Designer</p>

          <!-- Button -->
          <button
            class="mt-3 px-3 py-1 text-xs bg-sky-400 text-white rounded-full hover:bg-sky-500 transition"
          >
            Learn More
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
