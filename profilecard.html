<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-r from-purple-400 to-yellow-400 h-screen flex flex-col items-center justify-center"
  >
    <div
      class="bg-white/20 backdrop-blur-lg p-6 rounded-2xl shadow-xl text-center"
    >
      <img class="w-64 rounded-2xl mx-auto" src="img.jpg" alt="Profile Image" />
      <div class="items-center mt-6">
        <p class="text-lg font-semibold text-black">John Doe</p>
        <button
          class="bg-sky-500 hover:bg-sky-800 w-auto p-2 mt-2 rounded-lg shadow-md"
        >
          Hover
        </button>
      </div>
    </div>
  </body>
</html>
