<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-serif italic"
  >
    <header>
      <h1 class="text-6xl py-3">Shopper's Street</h1>
      <h2 class="text-4xl py-3">Your Choice, Our Styles</h2>
    </header>

    <div
      class="bg-gray-100 dark:bg-gray-800 p-6 rounded-xl shadow-md mx-6 my-6"
    >
      <h2 class="text-3xl text-center text-gray-800 dark:text-gray-300">
        Gadgets
      </h2>
      <div class="flex items-center justify-center py-5">
        <img
          src="smart watch.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
        <img
          src="smart watch 2.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
      </div>

      <h2 class="text-3xl text-center text-gray-800 dark:text-gray-300">
        Clothes
      </h2>
      <div class="flex items-center justify-center py-5">
        <img
          src="white hoodie.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
        <img
          src="Green Hoodie.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
      </div>

      <h2 class="text-3xl text-center text-gray-800 dark:text-gray-300">
        Sneakers
      </h2>
      <div class="flex items-center justify-center py-5">
        <img
          src="Sneakers.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
        <img
          src="blue sneakers.jfif"
          class="w-40 h-40 object-cover px-5 transition duration-300 hover:scale-110 hover:shadow-xl"
        />
      </div>
    </div>
  </body>
</html>
